# GitHub Actions Workflow: arXiv Keyword Alerter
# ==============================================================================
# このワークフローはForkしたユーザー向けに設計されています。
# 以下のSecretsを設定してご利用ください。
# ==============================================================================

name: arXiv Keyword Alerter

on:
  schedule:
    # 毎日 UTC 1時 (JST 10時) に実行
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-arxiv-alerter:
    runs-on: ubuntu-latest

    steps:
      # ステップ1: リポジトリのコードをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # ステップ2: Python環境をセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- ▼▼▼ ここからがキャッシュ処理 ▼▼▼ ---
      # ステップ3: pipのキャッシュパスを取得
      - name: Get pip cache dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      # ステップ4: キャッシュの復元・保存
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          # キャッシュするファイルのパス
          path: ${{ steps.pip-cache.outputs.dir }}
          # キャッシュのキー。requirements.txtが変更されるとキーも変わる
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          # 完全一致するキーがない場合に復元を試みるキー
          restore-keys: |
            ${{ runner.os }}-pip-
      # --- ▲▲▲ キャッシュ処理ここまで ▲▲▲ ---

      # ステップ5: 必要なPythonライブラリをインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txtからライブラリをインストールする
          pip install -r requirements.txt

      # ステップ6: Pythonスクリプトを実行
      # ----------------------------------------------------------------------
      # 設定方法:
      #   [Repository Secrets] (Settings > Secrets and variables > Actions)
      #     - GEMINI_API_KEY: Gemini API キー
      #     - SMTP_USER: SMTP認証ユーザー
      #     - SMTP_PASSWORD: SMTPパスワード（Gmailアプリパスワード等）
      #     - MAIL_FROM: 送信元メールアドレス
      #     - MAIL_TO: 送信先メールアドレス
      # ----------------------------------------------------------------------
      - name: Run arXiv Alerter script
        env:
          # Secrets（機密情報）- 必ず設定してください
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python arxiv_alerter.py
